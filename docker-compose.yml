services:
  postgres:
    image: postgres:16
    container_name: weather-data-postgres
    environment:
      POSTGRES_DB: weather_data
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: weather_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_data"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
